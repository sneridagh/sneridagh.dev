[project]
name = "sneridagh_dev"
dynamic = ["version"]
description = "A new project using Plone 6."
readme = "README.md"
license = "GPL-2.0-only"
requires-python = ">=3.13"
authors = [
    { name = "Victor Fernandez de Alba", email = "sneridagh@gmail.com" },
]
keywords = [
    "CMS",
    "Plone",
    "Python",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Web Environment",
    "Framework :: Plone",
    "Framework :: Plone :: 6.2",
    "Framework :: Plone :: Addon",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "Products.CMFPlone==6.2.0",
    "plone.api",
    "plone.restapi",
    "plone.volto",
    "kitconcept.voltolighttheme",
    "collective.blog>=1.0.0a5",
]

[dependency-groups]
test = [
    "horse-with-no-namespace",
    "plone.app.testing",
    "plone.restapi[test]",
    "pytest",
    "pytest-cov",
    "pytest-plone>=1.0.0a3",
]

container = [
    "plone.app.upgrade",
    "psycopg2==2.9.11",
    "relstorage==4.2.0",
    "zeo==6.1",
]

[project.urls]
Homepage = "https://github.com/collective/sneridagh-dev"
PyPI = "https://pypi.org/project/sneridagh_dev"
Source = "https://github.com/collective/sneridagh-dev"
Tracker = "https://github.com/collective/sneridagh-dev/issues"


[project.entry-points."plone.autoinclude.plugin"]
target = "plone"

[tool.uv]
managed = true
default-groups = ["test"]
